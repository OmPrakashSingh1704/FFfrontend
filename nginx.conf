server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Service worker and manifest must always revalidate so PWA updates land fast.
  location = /sw.js {
    add_header Cache-Control "public, max-age=0, must-revalidate";
    add_header Service-Worker-Allowed "/";
  }

  location = /registerSW.js {
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  location = /manifest.webmanifest {
    add_header Cache-Control "public, max-age=0, must-revalidate";
    types { } default_type application/manifest+json;
  }

  # Workbox runtime files are content-hashed, safe to cache long.
  location ~ ^/workbox-.*\.js$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # SEO infra files — pin content-type explicitly so they're never served
  # as text/html by the SPA fallback (which would silently break Google's
  # robots and sitemap parsers).
  location = /robots.txt {
    add_header Cache-Control "public, max-age=86400";
    types { } default_type text/plain;
  }

  # /sitemap.xml — proxy to the backend's dynamic endpoint so it always
  # reflects the current set of public founders/investors/startups. If the
  # backend is unreachable, fall back to the static file in public/ that
  # only lists the marketing URLs (better than a 502 to Googlebot).
  location = /sitemap.xml {
    add_header Cache-Control "public, max-age=3600";
    types { } default_type application/xml;
    proxy_intercept_errors on;
    error_page 502 503 504 = @sitemap_static;
    proxy_pass http://api:8000/api/v1/public/sitemap.xml;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location @sitemap_static {
    try_files /sitemap.xml =404;
  }

  location = /llms.txt {
    add_header Cache-Control "public, max-age=86400";
    types { } default_type text/plain;
  }

  location / {
    try_files $uri /index.html;
  }
}
